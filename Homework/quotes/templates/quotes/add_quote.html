<h1>Add Quote</h1>

<form method="post">
{% csrf_token %}

<textarea name="text" placeholder="Quote text"></textarea>
<br><br>

<select name="author">
{% for author in authors %}
<option value="{{ author.id }}">{{ author.fullname }}</option>
{% endfor %}
</select>

<br><br>

<input name="tags" placeholder="tags (life,love,success)">

<br><br>

<button type="submit">Add Quote</button>

</form>
