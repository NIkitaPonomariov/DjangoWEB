<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Quote</title>
    <meta charset="utf-8">
</head>
<body>
<h2>Add Quote</h2>

<form method="POST">
{% csrf_token %}

<h2>Quote text:</h2>
<p> <input type="text" name="text" placeholder="Enter quote"> </p>


<h2> Author: </h2>
<select name="author">
{% for author in authors %}

<option value="{{ author.id }}"> {{ author.fullname }} </option>

{% endfor %}
</select>



<br><br>
<h2> Tags: </h2>
<p> <input type="text" name="tags" placeholder="Tag"> </p>
<button type="submit">Save Quote</button>

</form>

</body>
</html>
