<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quotes</title>
    <meta charset="utf-8">
</head>
<body>

<h1>Quotes</h1>

<br>

{% for quote in quotes %}
<p> "" <strong><em>{{ quote.text }}</em></strong> "" </p>
    Author: 
    <strong>{{ quote.author.fullname }}</strong>

<p>
    Tag: 
    {% for tag  in quote.tags.all %}
        {{ tag.tag }}
    {% endfor %}
</p>

{% endfor %}

<a href="{% url 'add_author' %}">
    <button>Add Author</button>
</a>
<a href="{% url 'add_tag' %}">
    <button>Add Tag</button>
</a>
<a href="{% url 'add_quote' %}">
    <button>Add Quote</button>
</a>
</body>

</html>
