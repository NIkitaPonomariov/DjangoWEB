<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quotes</title>
    <meta charset="utf-8">
</head>
<body>

<h1>Quotes</h1>
{% for quote in quotes%}
<p><em>{{ quote.text }}</em></p>

<p>
    Author:
    <strong>{{ quote.author.fullname }}</strong>
</p>

<p>
    Tag: 
    {% for tag in quote.tags.all %}
    {{ tag.name }}
    {% endfor %}
</p>

{% endfor %}

<a href="{% url 'add_author' %}">
    <button>Add Author</button>
</a>
<a href="{% url 'add_tag' %}">
    <button>Add Tag</button>
</a>
<a href="{% url 'add_quote' %}">
    <button>Add Quote</button>
</a>

</body>

</html>
